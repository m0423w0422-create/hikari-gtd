function scheduleReminder(taskId, label, date, hour, min) {
  const key = "reminder_"+taskId;
  localStorage.setItem(key, JSON.stringify({taskId,label,date,hour,min}));
}

// リマインダーチェッカー（App内useEffectで呼ぶ）
const NTFY_TOPIC = "hikari-gtd";
const WORKER_URL = "https://gtd-reminder-worker.m0423-w0422.workers.dev";

async function sendNtfy(title, body, tag) {
  try {
    await fetch("https://ntfy.sh/" + NTFY_TOPIC, {
      method: "POST",
      headers: {
        "Title": encodeURIComponent(title),
        "Priority": "high",
        "Tags": tag || "bell",
        "Content-Type": "text/plain; charset=utf-8",
      },
      body: body,
    });
  } catch(e) {}
}

// 単一タスクのリマインダーをWorkerに即座に送信
async function syncSingleReminderToWorker(task) {
  try {
    // 全タスクからリマインダー対象を取得してWorkerに送信
    const tasks = JSON.parse(localStorage.getItem("gtd_tasks") || "[]");
    const reminders = tasks.filter(t =>
      !t.done && (
        (t.reminderSet && t.reminderDate) ||
        (t.taskType === "case" && t.nextActionDate)
      )
    );
    // 更新されたタスクをマージ
    const merged = reminders.filter(r=>r.id!==task.id);
    merged.push(task);
    await fetch(WORKER_URL + "/save", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(merged),
    });
  } catch(e) {}
}

// Workerにリマインダーデータを送信（バックグラウンド通知用）
async function syncRemindersToWorker(tasks) {
  try {
    const reminders = tasks.filter(t =>
      !t.done && (
        (t.reminderSet && t.reminderDate) ||
        (t.taskType === "case" && t.nextActionDate)
      )
    );
    await fetch(WORKER_URL + "/save", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(reminders),
    });
  } catch(e) {}
}

function checkReminders(tasks) {
  const now = new Date();
  const nowDate = now.toISOString().slice(0,10);
  const nowHour = now.getHours();
  const nowMin  = now.getMinutes();

  tasks.forEach(t => {
    if(t.done) return;

    // 通常リマインダー
    if(t.reminderSet && t.reminderDate) {
      if(t.reminderDate===nowDate && t.reminderHour===nowHour && t.reminderMin===nowMin) {
        const key = "nf_"+t.id+"_"+nowDate+"_"+nowHour+"_"+nowMin;
        if(!localStorage.getItem(key)) {
          // ntfy.shで通知（iPhone/Android両対応）
          sendNtfy(
            "🔔 " + t.text,
            String(t.reminderHour).padStart(2,"0")+":"+String(t.reminderMin).padStart(2,"0") + " のリマインダーです",
            "bell"
          );
          // ブラウザ通知（アプリが開いている場合）
          if("Notification" in window && Notification.permission==="granted") {
            try {
              new Notification("🔔 "+t.text, {
                body: String(t.reminderHour).padStart(2,"0")+":"+String(t.reminderMin).padStart(2,"0"),
                icon:"./icon.png", tag:"reminder_"+t.id, requireInteraction:true,
              });
            } catch(e) {}
          }
          // SW経由でも通知
          if(navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: "REMINDER_DATA", tasks: tasks,
            });
          }
          localStorage.setItem(key,"1");
        }
      }
    }

    // 案件のアクション日時
    if(t.taskType==="case" && t.nextActionDate) {
      const h=t.nextActionHour||9, m=t.nextActionMin||0;
      if(t.nextActionDate===nowDate && h===nowHour && m===nowMin) {
        const key="nf_case_"+t.id+"_"+nowDate+"_"+h+"_"+m;
        if(!localStorage.getItem(key)) {
          sendNtfy(
            "📋 案件: " + t.text,
            t.nextAction || "次のアクションの時間です",
            "spiral_notepad"
          );
          if("Notification" in window && Notification.permission==="granted") {
            try {
              new Notification("📋 案件: "+t.text, {
                body: t.nextAction||"次のアクションの時間です",
                icon:"./icon.png", tag:"case_"+t.id, requireInteraction:true,
              });
            } catch(e) {}
          }
          localStorage.setItem(key,"1");
        }
      }
    }
  });
}

                borderColor:h.days.includes(d)?"#1C1C1E":"#E5E7EB",
                background:h.days.includes(d)?"#1C1C1E":"#fff",
                color:h.days.includes(d)?"#fff":"#9CA3AF",
                fontSize:13,fontWeight:h.days.includes(d)?700:500,
                cursor:"pointer",fontFamily:"inherit"}}>{DOW[d]}</button>
          ))}
        </div>
        <SL>Todayに追加する時間</SL>
        <div style={{display:"flex",gap:8,marginBottom:18,alignItems:"center"}}>
          <select value={h.hour||7} onChange={e=>setH(x=>({...x,hour:+e.target.value}))}
            style={{flex:1,border:"1.5px solid #E5E7EB",borderRadius:8,
              padding:"9px 10px",fontSize:14,fontFamily:"inherit",
              outline:"none",background:"#fff",color:"#1C1C1E"}}>
            {Array.from({length:19},(_,i)=>i+5).map(hr=>(
              <option key={hr} value={hr}>{hr}:00</option>
            ))}
          </select>
          <select value={h.minute||0} onChange={e=>setH(x=>({...x,minute:+e.target.value}))}
            style={{flex:1,border:"1.5px solid #E5E7EB",borderRadius:8,
              padding:"9px 10px",fontSize:14,fontFamily:"inherit",
              outline:"none",background:"#fff",color:"#1C1C1E"}}>
            {[0,15,30,45].map(m=>(
              <option key={m} value={m}>{String(m).padStart(2,"0")}分</option>
            ))}
          </select>
        </div>
        <button onClick={()=>onSave(h)}
          style={{width:"100%",background:"#1C1C1E",color:"#fff",border:"none",
            borderRadius:9,padding:"11px",fontSize:14,fontWeight:700,
            cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>
          {habit.text?"保存":"追加"}
        </button>
        {onDelete&&<button onClick={()=>onDelete(h.id)}
          style={{width:"100%",background:"transparent",color:"#EF4444",
            border:"1.5px solid #FCA5A5",borderRadius:9,padding:"9px",
            fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>削除</button>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").then(reg => {
    // 新しいSWが待機中なら即座に有効化
    if(reg.waiting) reg.waiting.postMessage({type:"SKIP_WAITING"});
    reg.addEventListener("updatefound", () => {
      const newSW = reg.installing;
      if(newSW) {
        newSW.addEventListener("statechange", () => {
          if(newSW.state === "installed" && navigator.serviceWorker.controller) {
            // 新バージョン検出時にページをリロード
            window.location.reload();
          }
        });
      }
    });
    console.log("SW registered");
    // Periodic Syncの登録（対応ブラウザのみ）
    if("periodicSync" in reg) {
      navigator.permissions.query({name:"periodic-background-sync"}).then(status => {
        if(status.state === "granted") {
          reg.periodicSync.register("reminder-check", {minInterval: 60000}).catch(()=>{});
        }
      }).catch(()=>{});
    }
  }).catch(()=>{});

  // SWからのCHECK_REMINDERSメッセージを受け取ったらタスクを送り返す
  navigator.serviceWorker.addEventListener("message", e => {
    if(e.data && e.data.type === "CHECK_REMINDERS") {
      try {
        const tasks = JSON.parse(localStorage.getItem("gtd_tasks") || "[]");
        if(navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({
            type: "REMINDER_DATA",
            tasks: tasks,
          });
        }
      } catch(err) {}
    }
  });
}
</script>
</body>
</html>
